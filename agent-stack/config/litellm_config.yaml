# LiteLLM Proxy Configuration for Composable Agent Stack
# All agents route through this single proxy for unified LLM access.

model_list:
  # ── General aliases ──────────────────────────────────────────────
  - model_name: smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 500
      max_parallel_requests: 20
      weight: 45
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  - model_name: smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_2
    model_info:
      rpm: 500
      max_parallel_requests: 20
      weight: 45
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  - model_name: smart
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 500
      max_parallel_requests: 20
      weight: 10
      input_cost_per_token: 0.0000015
      output_cost_per_token: 0.000006

  - model_name: fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 120
      max_parallel_requests: 30
      input_cost_per_token: 0.0000015
      output_cost_per_token: 0.000006

  - model_name: local
    litellm_params:
      model: ollama/llama3
      api_base: http://ollama:11434
    model_info:
      rpm: 30
      max_parallel_requests: 5
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: claude
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      rpm: 60
      max_parallel_requests: 10
      input_cost_per_token: 0.000008
      output_cost_per_token: 0.000024

  # ── Per-platform aliases (capacity isolation) ────────────────────
  - model_name: agent-s-smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 300
      max_parallel_requests: 20
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  - model_name: browser-smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_2
    model_info:
      rpm: 200
      max_parallel_requests: 10
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  - model_name: openhands-smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_3
    model_info:
      rpm: 100
      max_parallel_requests: 5
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  # ── Special-purpose aliases ──────────────────────────────────────
  - model_name: vision-smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 200
      max_parallel_requests: 10
      input_cost_per_token: 0.00003
      output_cost_per_token: 0.00006

  - model_name: text-fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY_1
    model_info:
      rpm: 300
      max_parallel_requests: 20
      input_cost_per_token: 0.0000015
      output_cost_per_token: 0.000006

litellm_settings:
  max_budget: 1000.0
  budget_duration: "1mo"
  soft_budget: 800.0
  alerting:
    - slack
  success_callback:
    - prometheus
  failure_callback:
    - prometheus
  set_verbose: false

router_settings:
  routing_strategy: "usage-based"
  cooldown_time: 60
  allowed_fails: 3
  allowed_fails_policy: "consecutive"
  num_retries: 0
  fallbacks:
    - smart: [claude, fast, local]
    - claude: [fast, local]
    - agent-s-smart: [smart, fast, local]
    - browser-smart: [smart, fast, local]
    - openhands-smart: [smart, fast, local]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_master_key_return: true
  turn_off_message_logging: true
